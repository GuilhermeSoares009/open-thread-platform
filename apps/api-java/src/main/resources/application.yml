spring:
  application:
    name: openthread-api
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/openthread}
    username: ${DB_USER:openthread}
    password: ${DB_PASSWORD:openthread}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

springdoc:
  api-docs:
    path: /openapi
  swagger-ui:
    path: /swagger-ui

logging:
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} level=%-5level trace=%X{traceId:-} span=%X{spanId:-} corr=%X{correlation_id:-} [%thread] %logger{36} - %msg%n'

openthread:
  comments:
    max-depth: 6
  limits:
    post-max-length: 8000
    comment-max-length: 2000
